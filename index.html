<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MacBook Neo</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f7;
        }

        /* Top bar */
        .topbar {
            background: #f5f5f7;
            padding: 8px;
            font-size: 13px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .topbar button {
            background: black;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
        }

        /* Navbar */
        .menu {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 10px;
            font-size: 14px;
            background: white;
        }

        .menu a {
            text-decoration: none;
            color: black;
        }

        .menu a:hover {
            color: gray;
        }

        /* Nội dung */
        .hero {
            margin-top: 50px;
        }

        h1 {
            font-size: 60px;
            margin: 10px 0;
        }

        p {
            font-size: 22px;
            color: #555;
        }

        /* Button */
        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            margin: 10px;
            display: inline-block;
        }

        .btn-blue {
            background: #0071e3;
            color: white;
        }

        .btn-outline {
            border: 1px solid #0071e3;
            color: #0071e3;
        }

        /* Image */
        img {
            width: 500px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <!-- Top bar -->
    <div class="topbar">
        <span>Chọn quốc gia hoặc khu vực khác để xem nội dung phù hợp.</span>
        <select>
            <option>Việt Nam</option>
            <option>USA</option>
        </select>
        <button>Tiếp tục</button>
    </div>

    <!-- Menu -->
    <div class="menu">
        <a href="#"></a>
        <a href="#">Store</a>
        <a href="#">Mac</a>
        <a href="#">iPad</a>
        <a href="#">iPhone</a>
        <a href="#">Watch</a>
        <a href="#">AirPods</a>
        <a href="#">Support</a>
    </div>

    <!-- Nội dung -->
    <div class="hero">
        <h1>MacBook Neo</h1>
        <p>Amazing Mac. Surprising price.</p>

        <a href="#" class="btn btn-blue">Learn more</a>
        <a href="#" class="btn btn-outline">Buy</a>

        <br>

        <!-- Ảnh thật (KHÔNG lỗi) -->
        <img src="https://www.apple.com/v/macbook-air/s/images/overview/hero/hero_static__c9sislzzicq6_large.jpg" alt="MacBook">
    </div>

</body>
</html>
